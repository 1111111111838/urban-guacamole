name: Search Telegram Links

on:
  workflow_dispatch:
    inputs:
      search_term:
        description: 'מה תרצה לחפש?'
        required: true
        default: 'movie name'

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Search
        run: python search.py "${{ github.event.inputs.search_term }}"
